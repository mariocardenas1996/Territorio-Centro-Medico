<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro de Territorios</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#007BFF">
  <link rel="icon" href="icono.ico" type="image/x-icon" />
  <link rel="apple-touch-icon" href="icono-512.png" sizes="180x180">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- BOTÓN HAMBURGUESA -->
<button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
  <span></span>
  <span></span>
  <span></span>
</button>

<!-- MENÚ LATERAL -->
<div id="sidebar" class="sidebar">
  <!--<button class="close-btn" onclick="cerrarMenu()">✖</button>-->
  <h3 style="font-size: 30px;"><br>MENU</h3>
<!-- MENÚ LATERAL 
  <a style="font-size: 25px;" href="#" onclick="mostrarSeccion('predicacion')">📖 Predicación</a>
  <a style="font-size: 25px;" href="#" onclick="mostrarSeccion('campanas')">📣 Campañas</a>
-->

<div class="menu-header">
  <div class="menu-logo">📍</div>
  <div>
    <strong>Centro Médico</strong>
    <small>Registro de Territorios</small>
  </div>
</div>

  <a href="#" onclick="mostrarSeccion(event,'predicacion')">
  📖 Predicación
  </a>

  <a href="#" onclick="mostrarSeccion(event,'campañas')">
  📣 Campañas
  </a>
</div>



<!-- FONDO OSCURO -->
<div id="overlay" class="overlay" onclick="cerrarMenu()"></div>
<h1 id="titulo-principal" style="cursor:pointer;">Territorios Predicación</h1>

<div style="margin-bottom:15px; margin-top: 10px;">
  <button class="btn" onclick="descargarExcel()">📊 Descargar Excel</button>
</div>

<div class = "text" id="login-container">
  <input class = "login-card" type="password" id="password-input" placeholder="Contraseña" />
  <button class="btn-ingresar" onclick="login()">Ingresar</button>
</div>

<div id="admin-controls" style="text-align:center; display:none; margin-bottom:20px;">
  <button onclick="reiniciarTodo()" class="btn_login">🔁Reiniciar Todo</button>
  <button id="btn_log" onclick="logout()" class="btn_login">Salir</button>
</div>




  <div class="section bloqueado" id="section-semana">
    <h2>Predicación de entre semana</h2>
    <div class="grid" id="grid-semana"></div>
    <div class="btn-group">
      <button class="btn" id="editar-semana">🔧 Editar</button>
      <button class="btn" id="guardar-semana" disabled>💾 Guardar</button>
      <button class="btn btn-ver-mapa" data-img="Territorio Entre Semana.png">🗺 Ver Territorio</button>
    </div>
  </div>

  <div class="section bloqueado" id="section-sabado">
    <h2>Predicación Sábado</h2>
    <div class="grid" id="grid-sabado"></div>
    <div class="btn-group">
      <button class="btn" id="editar-sabado">🔧 Editar</button>
      <button class="btn" id="guardar-sabado" disabled>💾 Guardar</button>
      <button class="btn btn-ver-mapa" data-img="Territorio Sabado.png">🗺 Ver Territorio</button>
    </div>
  </div>

  <div class="section bloqueado" id="section-domingo">
    <h2>Predicación Domingo</h2>
    <div class="grid" id="grid-domingo"></div>
    <div class="btn-group">
      <button class="btn" id="editar-domingo">🔧 Editar</button>
      <button class="btn" id="guardar-domingo" disabled>💾 Guardar</button>
      <button class="btn btn-ver-mapa" data-img="Territorio Domingo.png">🗺 Ver Territorio</button>
    </div>
  </div>

  <!-- Modal -->
<div id="modal-mapa" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000000dd; z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
  <img id="imagen-mapa" src="" alt="Mapa del territorio" style="max-width:100%; max-height:90%; border:5px solid white; border-radius:8px;" />
  <button onclick="cerrarModal()" style="margin-top:20px; padding:10px 20px; font-size:1.1em; background:white; border:none; border-radius:6px; cursor:pointer;">Cerrar</button>
</div>

<!-- Modal de Bienvenida o Información al hacer clic en el título -->
<div id="modal-titulo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000000cc; z-index:10000; justify-content:center; align-items:center; flex-direction:column;">
  <img id="imagen-titulo" src="territorio.png" alt="Información del sistema" style="max-width:100%; max-height:90%; border:5px solid white; border-radius:8px;" />
  <button onclick="cerrarModalTitulo()" style="margin-top:20px; padding:10px 20px; font-size:1.1em; background:white; border:none; border-radius:6px; cursor:pointer;">Cerrar</button>
</div>

</script>

</body>
</html>
